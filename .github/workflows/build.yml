name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install build tools
        run: yes | sdkmanager "build-tools;35.0.0"
        
      - name: Build Release APK
        run: ./gradlew :app:assembleRelease -Pandroid.injected.build.abi=arm64-v8a -x :web:buildWebUi
        
      - name: Zipalign and Sign APK
        run: |
          keytool -genkey -v -keystore release.jks -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=rikkahub"
          $ANDROID_SDK_ROOT/build-tools/35.0.0/zipalign -v 4 app/build/intermediates/apk/release/app-arm64-v8a-release-unsigned.apk aligned.apk
          $ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner sign --ks release.jks --ks-pass pass:android --key-pass pass:android --out rikkahub-signed.apk aligned.apk
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rikkahub-release
          path: rikkahub-signed.apk
