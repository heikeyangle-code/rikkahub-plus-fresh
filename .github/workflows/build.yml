name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Build Release APK
        run: ./gradlew :app:assembleRelease -Pandroid.injected.build.abi=arm64-v8a -x :web:buildWebUi
        
      - name: Sign APK
        run: |
          keytool -genkey -v -keystore release.jks -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=rikkahub"
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore release.jks -storepass android -keypass android app/build/intermediates/apk/release/app-arm64-v8a-release-unsigned.apk release
          cp app/build/intermediates/apk/release/app-arm64-v8a-release-unsigned.apk rikkahub-signed.apk
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rikkahub-release
          path: rikkahub-signed.apk
