name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease -Pandroid.injected.build.abi=arm64-v8a -x :web:buildWebUi

      - name: Zipalign and Sign APK
        run: |
          UNSIGNED="app/build/intermediates/apk/release/app-arm64-v8a-release-unsigned.apk"
          $ANDROID_SDK_ROOT/build-tools/35.0.0/zipalign -v 4 "$UNSIGNED" aligned.apk
          $ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner sign \
            --ks app/app.key \
            --ks-pass pass:android \
            --key-pass pass:android \
            --min-sdk-version 26 \
            --out rikkahub-signed.apk \
            aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: rikkahub-release
          path: rikkahub-signed.apk
