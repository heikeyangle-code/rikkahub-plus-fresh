name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install build tools
        run: yes | sdkmanager "build-tools;35.0.0"
        
      - name: Build Release APK
        run: ./gradlew :app:assembleRelease -Pandroid.injected.build.abi=arm64-v8a -x :web:buildWebUi
        
      - name: Zipalign and Sign APK
        run: |
          # 用完整 DN 生成证书（MIUI 可能因 CN-only 拒绝）
          keytool -genkey -v \
            -keystore release.jks \
            -alias release \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=RikkaHub Plus, OU=Dev, O=RikkaHub, L=Beijing, ST=Beijing, C=CN"

          # 确认 unsigned APK 存在
          UNSIGNED_APK="app/build/intermediates/apk/release/app-arm64-v8a-release-unsigned.apk"
          if [ ! -f "$UNSIGNED_APK" ]; then
            echo "UNSIGNED APK NOT FOUND, listing intermediates:"
            find app/build/intermediates/apk -name "*.apk" 2>/dev/null
            exit 1
          fi
          ls -lh "$UNSIGNED_APK"

          $ANDROID_SDK_ROOT/build-tools/35.0.0/zipalign -v 4 "$UNSIGNED_APK" aligned.apk
          $ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner sign \
            --ks release.jks \
            --ks-pass pass:android \
            --key-pass pass:android \
            --min-sdk-version 26 \
            --out rikkahub-signed.apk \
            aligned.apk
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rikkahub-release
          path: rikkahub-signed.apk
